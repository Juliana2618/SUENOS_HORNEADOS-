<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sueños Horneados</title>

<!-- FUENTE BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #fff7fa;
  margin: 0;
}

/* HEADER */
header {
  background: white;
  text-align: center;
  padding: 30px 20px 10px;
}

header h1 {
  color: #d63384;
  font-size: 34px;
  margin: 0;
}

header p {
  color: #888;
  font-size: 14px;
  margin-top: 5px;
}

/* SECCIONES */
h2 {
  margin-left: 25px;
  color: #d63384;
  font-weight: 600;
}

/* GRID */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  padding: 20px;
}

/* TARJETAS */
.card {
  background: #ffffff;
  border-radius: 18px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* TEXTO */
.nombre {
  padding: 10px;
  font-weight: 500;
  color: #333;
}

/* BOTÓN */
.boton {
  display: block;
  margin: 10px;
  padding: 10px;
  text-align: center;
  background: #d63384;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
}

.boton:hover {
  background: #ad2a6c;
}
.logo {
  width: 180px;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Sueños Horneados" class="logo">
  <p>Endulzando tus momentos 💖</p>
</header>


<div id="productos"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRDb2BE2mvCpXKA56EjLIzMnn0YVKIyHLK0BM7HeSJXJcFVrwzjKOFy8e9dNciWJGIjpRV8UiA63oRt/pub?output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.split("\n").slice(1);
  let categorias = {};

  filas.forEach(fila => {

    // Soporta coma y punto y coma
    const columnas = fila.split(/,|;/);

    const nombre = columnas[0]?.trim();
    const imagen = columnas[1]?.trim();
    const categoria = columnas[2]?.trim();

    if(nombre && imagen && categoria){

      if(!categorias[categoria]){
        categorias[categoria] = [];
      }

      categorias[categoria].push({nombre, imagen});
    }
  });

  let html = "";

  for(let cat in categorias){

    html += `<h2>${cat}</h2>`;
    html += `<div class="contenedor">`;

    categorias[cat].forEach(p => {
      html += `
        <div class="card">
          <img src="${p.imagen}" onerror="this.style.display='none'">
          <div class="nombre">${p.nombre}</div>
          <a class="boton" href="https://wa.me/573001234567?text=Hola%20quiero%20pedir%20${p.nombre}" target="_blank">
            Pedir por WhatsApp 💬
          </a>
        </div>
      `;
    });

    html += `</div>`;
  }

  document.getElementById("productos").innerHTML = html;
});
</script>

</body>
</html>
