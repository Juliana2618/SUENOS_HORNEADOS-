<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sueños Horneados</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #fff5f8;
  margin: 0;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 20px;
}

.logo {
  width: 180px;
}

header p {
  color: #888;
  margin-top: 5px;
}

/* SECCIONES */
h2 {
  text-align: center;
  color: #d63384;
  margin-top: 30px;
}

/* GRID */
.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 30px;
  padding: 20px 40px;
}

/* TARJETAS */
.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-8px);
}

/* IMAGEN (BONITA Y SIN CORTES FEOS) */
.card img {
  width: 100%;
  height: 200px;
  object-fit: contain;
  background: #fff;
  border-radius: 15px;
  padding: 10px;
}

/* NOMBRE */
.nombre {
  font-weight: 500;
  color: #444;
  margin-top: 10px;
  min-height: 40px;
}

/* BOTÓN */
.boton {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #ff6fa5;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.boton:hover {
  background: #d63384;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <p>Endulzando tus momentos 💖</p>
</header>

<div id="productos"></div>

<footer>
  © 2026 Sueños Horneados 🍰
</footer>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRDb2BE2mvCpXKA56EjLIzMnn0YVKIyHLK0BM7HeSJXJcFVrwzjKOFy8e9dNciWJGIjpRV8UiA63oRt/pub?output=csv")
.then(res => res.text())
.then(data => {

  const filas = data.split("\n").slice(1);
  let categorias = {};

  filas.forEach(fila => {
    const columnas = fila.split(/,|;/);

    const nombre = columnas[0]?.trim();
    const imagen = columnas[1]?.trim();
    const categoria = columnas[2]?.trim();

    if(nombre && imagen && categoria){

      if(!categorias[categoria]){
        categorias[categoria] = [];
      }

      categorias[categoria].push({nombre, imagen});
    }
  });

  let html = "";

  for(let cat in categorias){

    html += `<h2>${cat}</h2>`;
    html += `<div class="contenedor">`;

    categorias[cat].forEach(p => {
      html += `
        <div class="card">
          <img src="${p.imagen}" onerror="this.style.display='none'">
          <div class="nombre">${p.nombre}</div>
          <a class="boton" href="https://wa.me/573001234567?text=Hola%20quiero%20pedir%20${p.nombre}" target="_blank">
            Pedir por WhatsApp 💬
          </a>
        </div>
      `;
    });

    html += `</div>`;
  }

  document.getElementById("productos").innerHTML = html;
});
</script>

</body>
</html>
